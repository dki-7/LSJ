<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Papers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    .paper-list {
      list-style: none;
      padding: 0;
      margin: 24px 0 0 0;
    }

    .paper-item {
      padding: 18px 0;
      border-top: 1px solid #e5e5e5;
    }

    .paper-item a {
      font-size: 18px;
      font-weight: 600;
      color: #1565c0;
      text-decoration: none;
    }

    .paper-item a:hover {
      text-decoration: underline;
    }

    .paper-desc {
      margin-top: 6px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>Papers</h1>
    <p>Research papers and project documents.</p>

    <ul class="paper-list">
      <li class="paper-item">
        <a href="./three-principles-of-lsj/">The Three Principles of LSJ</a>
        <div class="paper-desc">
          A paper introducing the three core principles of LSJ.
        </div>
      </li>
    </ul>
  </main>
</body>
</html>
